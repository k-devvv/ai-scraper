services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-scraper-ollama
    restart: unless-stopped
    dns: [8.8.8.8, 8.8.4.4]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  redis:
    image: redis:7-alpine
    container_name: ai-scraper-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  tor:
    image: dperson/torproxy:latest
    container_name: ai-scraper-tor
    restart: unless-stopped
    environment:
      - TOR_MaxCircuitDirtiness=60
      - TOR_NewCircuitPeriod=30
    ports:
      - "9050:9050"   # SOCKS5 proxy
      - "9051:9051"   # Control port
    dns: [8.8.8.8, 8.8.4.4]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-scraper-api
    restart: unless-stopped
    depends_on:
      - ollama
      - redis
      - tor
    dns: [8.8.8.8, 8.8.4.4]
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      OLLAMA_HOST: "http://ollama:11434"
      REDIS_URL: "redis://redis:6379"
      DB_PATH: "/app/output/scraper.db"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-qwen2.5:7b}"
      API_KEY: "${API_KEY:-}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
      # Tor config
      USE_TOR: "true"
      TOR_SOCKS_HOST: "tor"
      TOR_SOCKS_PORT: "9050"
      TOR_CONTROL_PORT: "9051"
      TOR_ROTATE_EVERY: "10"
      # Optional manual proxy list (comma-separated)
      PROXY_LIST: "${PROXY_LIST:-}"
      # Rate limits
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-60}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    volumes:
      - ./output:/app/output
      - ./.scraper-state:/app/.scraper-state
      - ./.sessions:/app/.sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:
    name: ai-scraper-ollama-data
  redis_data:
    name: ai-scraper-redis-data
